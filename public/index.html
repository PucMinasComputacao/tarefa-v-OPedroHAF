<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>UAITour</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-success">
            <div class="container-fluid">
                <a href="#" class="navbar-brand text-light">UAITour</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" data-bs-theme="dark">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a href="#" class="nav-link text-light">Home</a></li>
                        <li class="nav-item"><a href="#" class="nav-link text-light">Sobre nós</a></li>
                        <li class="nav-item"><a href="#" class="nav-link text-light">Locais</a></li>
                        <li class="nav-item "><a href="#" class="nav-link text-light">Contato</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="banner position-relative">
            <img src="imgs/CURA-BH-FOTO-TAMAS-BODOLAY-1-e1756461678916.jpg" alt="Foto Belo Horizonte" class="w-100">
            <div class="w-100 p-3 position-absolute bottom-0 end-0 text-center">
                <p class="text-white fst-italic fs-5" style="text-shadow: 2px 2px 2px black;">"Belo aqui, belo adiante, de um horizonte gigante. Um solo que acolhe a gente" — Rejane Helena Neves.</p>
            </div>
        </div>
    </main>
    <section>
        <div class="container">
            <div class="row">
                <h2 class="col text-center p-4">
                   🔥 Lugares Trend 🔥
                </h2>
            </div>
            <div id="cardCarousel" class="carousel slide carousel-fade">
                <div class="carousel-inner px-4">
                    <div class="carousel-item active">
                        <img src="https://picsum.photos/500/500?random=1" alt="" class="d-block w-100">
                    </div>
                    <div class="carousel-item">
                        <img src="https://picsum.photos/500/500?random=2" alt="" class="d-block w-100">
                    </div>
                    <div class="carousel-item">
                        <img src="https://picsum.photos/500/500?random=3" alt="" class="d-block w-100">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#cardCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#cardCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#cardCarousel" data-bs-slide-to="0" class="active"></button>
                    <button type="button" data-bs-target="#cardCarousel" data-bs-slide-to="1"></button>
                    <button type="button" data-bs-target="#cardCarousel" data-bs-slide-to="2"></button>
                </div>
            </div>
        </div>
    </section>
    <footer class="container-fluid">
        <div class="bg-dark p-4 mt-5">
            <div class="text-center text-white">Copyright</div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
